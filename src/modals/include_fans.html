<div id="edit_bind_modal" class="combine-modal" style="display: block">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content wide">
            <form id="set_fans" action="/" method="post">
                <header class="modal-header">
                    <h4 class="modal-title">Set fans</h4>
                </header>
                <div class="modal-body cols">
                    <fieldset class="col">
                        <div>
                            <label for="include">Include fans</label>
                            <textarea id="include" name="include" rows="10" required
                                placeholder="3423234">{USERIDS}</textarea>
                        </div>
                    </fieldset>
                    <fieldset class="col">
                        <div>
                            <label for="exclude">Exclude fans</label>
                            <textarea id="exclude" name="exclude" rows="10"
                                placeholder="3423234">{EXCLUIDEDUSERIDS}</textarea>
                        </div>
                    </fieldset>
                </div>
                <footer class="modal-footer">
                    <button type="reset" class="g-btn m-flat m-btn-gaps m-reset-width"> Reset </button>
                    <button type="submit" class="g-btn m-flat m-btn-gaps m-reset-width"> Save </button>
                </footer>
            </form>
        </div>
    </div>
</div>
